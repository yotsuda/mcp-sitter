name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build mcp-sitter (Debug)
        run: dotnet build -c Debug --nologo

      - name: Build FakeMcp (Debug)
        run: dotnet build test/FakeMcp/FakeMcp.csproj -c Debug --nologo

      - name: Install Pester 5
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester |
                    Where-Object { $_.Version -ge [Version]'5.0.0' })) {
            Install-Module Pester -MinimumVersion 5.0.0 -Force `
              -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Run Pester integration tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './test/McpSitter.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  publish:
    name: publish (${{ matrix.rid }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: macos-13,       rid: osx-x64 }    # Intel runner
          - { os: macos-latest,   rid: osx-arm64 }  # Apple Silicon runner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (Release, NativeAOT, ${{ matrix.rid }})
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o out/${{ matrix.rid }} --nologo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sitter-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/mcp-sitter*
          if-no-files-found: error

  publish-npm:
    # Publishes mcp-sitter to npmjs.com with SLSA provenance via
    # OIDC-based Trusted Publisher (no NPM_TOKEN anywhere).
    #
    # Prerequisites (one-time setup on npmjs.com, after initial manual publish):
    #   Settings -> Trusted Publishers -> Add
    #     Publisher: GitHub Actions
    #     Org/User:  yotsuda
    #     Repo:      mcp-sitter
    #     Workflow:  .github/workflows/ci.yml
    #     Env:       (leave blank; tag push gates the job via the `if:` below)
    #
    # The committed `npm/dist/mcp-sitter.exe` is what ships. Sign it locally
    # via `.\Build.ps1 -Sign` (PFX password prompted on your machine, never
    # touches CI), commit, then push the `vX.Y.Z` tag.
    name: publish-npm (provenance)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC for Trusted Publisher + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify signed binary is committed
        working-directory: npm
        run: |
          if [ ! -f dist/mcp-sitter.exe ]; then
            echo "::error::npm/dist/mcp-sitter.exe is missing. Run '.\\Build.ps1 -Sign' locally and commit before pushing the tag."
            exit 1
          fi
          size=$(stat -c%s dist/mcp-sitter.exe)
          echo "npm/dist/mcp-sitter.exe present ($size bytes)"

      - name: npm publish (with provenance)
        working-directory: npm
        run: npm publish --provenance
